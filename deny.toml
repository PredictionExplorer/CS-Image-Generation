[advisories]
unmaintained = "all"
unsound = "all"
yanked = "warn"
unused-ignored-advisory = "warn"
ignore = [
    { id = "RUSTSEC-2024-0436", reason = "Transitive via nalgebra/simba; no patched release is available. Track with cargo audit and dependency updates." },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
]
confidence-threshold = 0.8
unused-allowed-license = "allow"
include-dev = true
include-build = true

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
